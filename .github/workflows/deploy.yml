name: Build & Deploy Ionic App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --force

      - name: Install Ionic CLI
        run: npm install -g @ionic/cli

      # 🔐 Inject GitHub Secrets into Angular environment
      - name: Create environment.prod.ts
        run: |
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            firebase: {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}',
            },
            production: true,
          };
          EOF

      - name: Build app
        run: ionic build --prod -- --base-href="https://jolantalachman.github.io/pictogram-app/"

      - name: Deploy to GitHub Pages
        run: |
          npx angular-cli-ghpages --dir=www --no-silent